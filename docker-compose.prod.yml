services:
  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - app_data:/app/data

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  app_data:
