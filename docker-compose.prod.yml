services:
  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    ports:
      - "8181:8080"
    env_file: .env.prod
    volumes:
      - app_data:/app/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  app_data:
