services:
  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    ports:
      - "8181:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:./data/knowledge.db}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: "8080"
      RUST_LOG: ${RUST_LOG:-knowledge_api=info,tower_http=info}
    volumes:
      - app_data:/app/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  app_data:
