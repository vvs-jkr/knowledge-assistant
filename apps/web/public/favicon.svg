<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Black rounded square background -->
  <rect width="64" height="64" rx="12" ry="12" fill="#0a0a0a"/>

  <!-- Neural network nodes — left input layer -->
  <circle cx="14" cy="20" r="3.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="14" cy="32" r="3.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="14" cy="44" r="3.5" fill="#ffffff" opacity="0.9"/>

  <!-- Middle hidden layer (purple) -->
  <circle cx="32" cy="14" r="3.5" fill="#a78bfa"/>
  <circle cx="32" cy="27" r="3.5" fill="#a78bfa"/>
  <circle cx="32" cy="40" r="3.5" fill="#a78bfa"/>
  <circle cx="32" cy="53" r="3.5" fill="#a78bfa"/>

  <!-- Right output layer -->
  <circle cx="50" cy="24" r="3.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="50" cy="40" r="3.5" fill="#ffffff" opacity="0.9"/>

  <!-- Connections left → middle -->
  <line x1="17.5" y1="20" x2="28.5" y2="14"  stroke="#ffffff" stroke-width="1.1" opacity="0.3"/>
  <line x1="17.5" y1="20" x2="28.5" y2="27"  stroke="#ffffff" stroke-width="1.1" opacity="0.3"/>
  <line x1="17.5" y1="32" x2="28.5" y2="27"  stroke="#ffffff" stroke-width="1.1" opacity="0.3"/>
  <line x1="17.5" y1="32" x2="28.5" y2="40"  stroke="#ffffff" stroke-width="1.1" opacity="0.3"/>
  <line x1="17.5" y1="44" x2="28.5" y2="40"  stroke="#ffffff" stroke-width="1.1" opacity="0.3"/>
  <line x1="17.5" y1="44" x2="28.5" y2="53"  stroke="#ffffff" stroke-width="1.1" opacity="0.3"/>

  <!-- Connections middle → right -->
  <line x1="35.5" y1="14"  x2="46.5" y2="24" stroke="#a78bfa" stroke-width="1.1" opacity="0.5"/>
  <line x1="35.5" y1="27"  x2="46.5" y2="24" stroke="#a78bfa" stroke-width="1.1" opacity="0.5"/>
  <line x1="35.5" y1="27"  x2="46.5" y2="40" stroke="#a78bfa" stroke-width="1.1" opacity="0.5"/>
  <line x1="35.5" y1="40"  x2="46.5" y2="24" stroke="#a78bfa" stroke-width="1.1" opacity="0.5"/>
  <line x1="35.5" y1="40"  x2="46.5" y2="40" stroke="#a78bfa" stroke-width="1.1" opacity="0.5"/>
  <line x1="35.5" y1="53"  x2="46.5" y2="40" stroke="#a78bfa" stroke-width="1.1" opacity="0.5"/>
</svg>
